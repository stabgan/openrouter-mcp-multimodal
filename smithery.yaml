name: openrouter-mcp-multimodal
version: 4.5.0
description: MCP server for OpenRouter — chat (with provider routing + :nitro/:floor variants), image / audio / video analysis, image / audio / video generation (Veo 3.1, Sora, Seedance, Wan). Apache 2.0.

image:
  name: ghcr.io/stabgan/openrouter-mcp-multimodal
  tag: latest

entrypoint: ["node", "dist/index.js"]

startCommand:
  type: stdio
  configSchema:
    type: object
    required: ["OPENROUTER_API_KEY"]
    properties:
      OPENROUTER_API_KEY:
        type: string
        description: OpenRouter API key (https://openrouter.ai/keys)
      OPENROUTER_DEFAULT_MODEL:
        type: string
        description: Default model for chat + analyze tools
        default: "nvidia/nemotron-nano-12b-v2-vl:free"
      DEFAULT_MODEL:
        type: string
        description: Alias for OPENROUTER_DEFAULT_MODEL
      OPENROUTER_MAX_TOKENS:
        type: string
        description: Default max_tokens on chat_completion when unset per-call (v4+).
      OPENROUTER_PROVIDER_SORT:
        type: string
        description: price / throughput / latency
      OPENROUTER_PROVIDER_IGNORE:
        type: string
        description: CSV of provider slugs to exclude.
      OPENROUTER_PROVIDER_ORDER:
        type: string
        description: JSON array or CSV of preferred provider IDs.
      OPENROUTER_PROVIDER_QUANTIZATIONS:
        type: string
        description: CSV of quantization levels (fp16,int8).
      OPENROUTER_PROVIDER_REQUIRE_PARAMETERS:
        type: string
        description: true/false. Require providers to support all request params.
      OPENROUTER_PROVIDER_DATA_COLLECTION:
        type: string
        description: allow/deny
      OPENROUTER_PROVIDER_ALLOW_FALLBACKS:
        type: string
        description: true/false
      OPENROUTER_OUTPUT_DIR:
        type: string
        description: Sandbox root for save_path on generate_* tools.
      OPENROUTER_INPUT_DIR:
        type: string
        description: Sandbox root for input_images on generate_image and frame/reference images on generate_video (v4+).
      OPENROUTER_CACHE_RESPONSES:
        type: string
        description: Enable response caching server-wide (v4.5+). Sends X-OpenRouter-Cache: true on chat/analyze calls unless overridden per-request. Zero tokens billed on cache hits.
      OPENROUTER_INCLUDE_REASONING:
        type: string
        description: Enable reasoning tokens passthrough server-wide (v4.5+). Adds _meta.reasoning to chat_completion responses for DeepSeek R1 / Gemini Thinking / Opus 4.7.
  commandFunction: |
    function getCommand(config) {
      const env = { OPENROUTER_API_KEY: config.OPENROUTER_API_KEY };
      if (config.OPENROUTER_DEFAULT_MODEL || config.DEFAULT_MODEL) {
        env.OPENROUTER_DEFAULT_MODEL =
          config.OPENROUTER_DEFAULT_MODEL || config.DEFAULT_MODEL;
      }
      for (const key of [
        "OPENROUTER_MAX_TOKENS",
        "OPENROUTER_PROVIDER_SORT",
        "OPENROUTER_PROVIDER_IGNORE",
        "OPENROUTER_PROVIDER_ORDER",
        "OPENROUTER_PROVIDER_QUANTIZATIONS",
        "OPENROUTER_PROVIDER_REQUIRE_PARAMETERS",
        "OPENROUTER_PROVIDER_DATA_COLLECTION",
        "OPENROUTER_PROVIDER_ALLOW_FALLBACKS",
        "OPENROUTER_OUTPUT_DIR",
        "OPENROUTER_INPUT_DIR",
        "OPENROUTER_CACHE_RESPONSES",
        "OPENROUTER_INCLUDE_REASONING",
      ]) {
        if (config[key]) env[key] = config[key];
      }
      return {
        command: "node",
        args: ["dist/index.js"],
        env,
      };
    }

build:
  dockerfile: Dockerfile
  dockerBuildPath: "."

publish:
  smithery: true
  dockerhub:
    enabled: true
    username: stabgan
    repository: openrouter-mcp-multimodal

config:
  env:
    - name: OPENROUTER_API_KEY
      description: OpenRouter API key
      required: true
    - name: OPENROUTER_DEFAULT_MODEL
      description: Default model for chat + analyze tools
      required: false
      defaultValue: "nvidia/nemotron-nano-12b-v2-vl:free"
    - name: OPENROUTER_MAX_TOKENS
      description: Default max_tokens on chat_completion when unset per-call (v4+)
      required: false
    - name: OPENROUTER_PROVIDER_SORT
      description: price / throughput / latency
      required: false
    - name: OPENROUTER_PROVIDER_IGNORE
      description: CSV of provider slugs to exclude
      required: false
    - name: OPENROUTER_PROVIDER_ORDER
      description: JSON array or CSV of preferred provider IDs
      required: false
    - name: OPENROUTER_PROVIDER_QUANTIZATIONS
      description: CSV of quantization levels (fp16,int8)
      required: false
    - name: OPENROUTER_PROVIDER_REQUIRE_PARAMETERS
      description: true/false
      required: false
    - name: OPENROUTER_PROVIDER_DATA_COLLECTION
      description: allow/deny
      required: false
    - name: OPENROUTER_PROVIDER_ALLOW_FALLBACKS
      description: true/false
      required: false
    - name: OPENROUTER_OUTPUT_DIR
      description: Sandbox root for save_path on generate_* tools
      required: false
    - name: OPENROUTER_INPUT_DIR
      description: Sandbox root for input_images and frame/reference images (v4+)
      required: false
    - name: OPENROUTER_CACHE_RESPONSES
      description: Enable response caching server-wide (v4.5+). Sends X-OpenRouter-Cache on chat/analyze calls unless overridden per-request.
      required: false
    - name: OPENROUTER_INCLUDE_REASONING
      description: Enable reasoning tokens passthrough server-wide (v4.5+). Adds _meta.reasoning to chat_completion responses.
      required: false

documentation:
  description: |
    All-in-one MCP server for OpenRouter. Chat with 300+ LLMs (Claude, Gemini, GPT, Llama,
    Qwen, Grok), analyze images / audio / video, generate images / speech / music / video
    (Veo 3.1, Sora 2 Pro, Seedance, Wan). chat_completion supports OpenRouter's provider
    routing (quantizations / ignore / sort / order / require_parameters / data_collection /
    allow_fallbacks) and the :nitro / :floor model variant suffixes. Apache 2.0, structured
    _meta.code error taxonomy, IPv4+IPv6 SSRF guards, path-sandboxed disk output, sandboxed
    input images on both generate_image and generate_video, multi-arch Docker.
  usage: |
    Tools:
    - chat_completion — 300+ models, provider-routing controls, :nitro/:floor variants
    - analyze_image / analyze_audio / analyze_video — files, URLs, data URLs
    - generate_image — aspect_ratio + image_size + input_images for style consistency
    - generate_audio — speech / music, format auto-detection
    - generate_video — Veo 3.1 / Sora 2 Pro / Seedance / Wan via async API
    - get_video_status — resume a video job by id
    - search_models / get_model_info / validate_model
  link: https://github.com/stabgan/openrouter-mcp-multimodal
